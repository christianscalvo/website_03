{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Christian Calvo | Data Analytics Portfolio{% endblock %}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <meta name="description" content="Christian S. Calvo's data analytics and business intelligence portfolio featuring Power BI, SQL, Python, and operations analytics projects.">

    <link rel="stylesheet" href="{% static 'pages/styles.css' %}">
</head>
<body>
    <header class="site-header">
        <nav class="navbar">
            <a class="brand" href="{% url 'home' %}">Christian S. Calvo</a>

            <div class="nav-links">
                <a href="{% url 'home' %}">Home</a>
                <a href="{% url 'projects' %}">Projects</a>
                <a href="{% url 'about' %}">About</a>
                <a href="{% url 'resume' %}">Resume</a>
            </div>
        </nav>
    </header>

    <main>
        {% block content %}
        {% endblock %}
    </main>

    <footer class="site-footer">
        <p>© 2026 Christian Calvo. Built with Django.</p>
    </footer>
</body>
</html>
